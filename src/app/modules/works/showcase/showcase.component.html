<section class="container pt-5 pb-sm-3 mt-5 mb-2 mb-md-3 mb-lg-4 mb-xxl-5">
  <!-- Breadcrumb-->
  <nav aria-label="breadcrumb">
    <ol class="pt-lg-3 pb-lg-4 pb-2 breadcrumb">
      <li class="breadcrumb-item"><a routerLink="/">Home</a></li>
      <li class="breadcrumb-item active" aria-current="page">Works</li>
    </ol>
  </nav>
  <!-- Page title-->
  <h1 class="pb-3">My recent works</h1>
  <div *ngFor="let item of items; let i = index" class="row align-items-center pt-xl-2 pb-5 mb-lg-2 mb-xl-3 mb-xxl-4">
    <div class="col-md-7 col-lg-6 mb-4 mb-md-0">
      <a class="d-block position-relative" [href]="item.link">
      </a>
    </div>
    <div class="col-md-5 col-xl-4 offset-lg-1" data-aos="fade-up" [attr.data-aos-duration]="(i + 2 *2)*100"
      data-aos-offset="100">
      <div class="ps-md-3 ps-lg-0">
        <h2 class="h4">{{ item.heading }}</h2>
        <p class="fs-sm pb-2 pb-lg-2 mb-3">{{ item.description }}</p>
        <p class="fs-sm pb-2 pb-lg-2 mb-3">Tech: {{item.tech}}</p>
        <a class="btn btn-sm btn-outline-dark rounded-pill" [href]="item.link"
          [attr.disabled]="!item.link ? true : ''">{{!item.link ? 'private' : 'Browse'}}</a>
      </div>
    </div>
  </div>
</section>
